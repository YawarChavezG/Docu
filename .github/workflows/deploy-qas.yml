# ════════════════════════════════════════════════════════════════
# COFAR SGD — CI/CD Pipeline: Deploy a QAS
#
# Trigger: push de tag v*-qas (ej: v1.1.1-qas)
#
# Flujo:
#   1. Crea BD PostgreSQL fresh (servicio Docker)
#   2. Corre alembic upgrade head (valida migrations)
#   3. Corre pthreads (337+ tests)
#   4. Corre seeds (valida idempotencia)
#   5. Build imagenes Docker
#   6. Push imagenes a GitHub Container Registry (ghcr.io)
#   7. SSH a QAS → deploy con nuevas imagenes
#
# Requisitos:
#   - Secrets: SSH_PRIVATE_KEY, QAS_HOST, QAS_USER
#   - GHCR_TOKEN (automatico con GITHUB_TOKEN)
#
# ════════════════════════════════════════════════════════════════
name: Deploy a QAS

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-qas'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PG_USER: sgd
  PG_PASSWORD: sgd_ci
  PG_DB: sgd_ci

jobs:

  # ─── FASE 1: Validacion ─────────────────────────────────────
  validate:
    name: Validar migrations + tests + seeds
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
          POSTGRES_DB: ${{ env.PG_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U ${{ env.PG_USER }} -d ${{ env.PG_DB }}
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt

      - name: Ejecutar alembic upgrade head
        run: |
          cd backend
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.PG_USER }}:${{ env.PG_PASSWORD }}@localhost:5432/${{ env.PG_DB }}
          ENVIRONMENT: ci
          LDAP_ENABLED: 'false'

      - name: Verificar alembic head
        run: |
          HEAD=$(psql -U ${{ env.PG_USER }} -d ${{ env.PG_DB }} -tA -c "SELECT version_num FROM alembic_version")
          echo "Alembic head: $HEAD"
          if [ "$HEAD" != "r3_plantillas_table_s37" ]; then
            echo "ERROR: Head esperado r3_plantillas_table_s37, actual: $HEAD"
            exit 1
          fi
        env:
          PGPASSWORD: ${{ env.PG_PASSWORD }}

      - name: Validar entrypoint modo CI
        run: |
          cd backend
          bash scripts/entrypoint.sh
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.PG_USER }}:${{ env.PG_PASSWORD }}@localhost:5432/${{ env.PG_DB }}
          ENVIRONMENT: ci
          LDAP_ENABLED: 'false'

      - name: Ejecutar pytest
        run: |
          cd backend
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -q --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          ENVIRONMENT: test
          LDAP_ENABLED: 'false'

  # ─── FASE 2: Build + Push imagenes ──────────────────────────
  build:
    name: Build y push imagenes Docker
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}

      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}

  # ─── FASE 3: Deploy a QAS ───────────────────────────────────
  deploy:
    name: Deploy a servidor QAS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QAS_HOST }}
          username: ${{ secrets.QAS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/sgd

            # Actualizar codigo
            git fetch origin
            git checkout ${{ github.ref_name }}

            # Pull imagenes nuevas
            docker compose -f deploy/docker-compose.qas.yml pull backend frontend

            # Recrear containers con nuevas imagenes
            docker compose -f deploy/docker-compose.qas.yml --env-file .env.qas up -d

            # Esperar healthchecks
            sleep 15
            docker restart sgd-qas-nginx

            # Ejecutar seeds
            bash scripts/start-stack-qas.sh

            # Validar
            bash scripts/validate-qas.sh
