name: Deploy a QAS
on: push
jobs:
  ci:
    name: CI - Validar migrations + tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sgd
          POSTGRES_PASSWORD: sgd_ci
          POSTGRES_DB: sgd_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: cd backend && pip install -r requirements/base.txt
      - name: Alembic upgrade head
        run: cd backend && alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://sgd:sgd_ci@localhost:5432/sgd_ci"
          ENVIRONMENT: ci
          LDAP_ENABLED: 'false'
      - name: Entrypoint modo CI
        run: sudo apt-get update -qq && sudo apt-get install -y -qq netcat-openbsd && cd backend && bash scripts/entrypoint.sh
        env:
          DATABASE_URL: "postgresql+asyncpg://sgd:sgd_ci@localhost:5432/sgd_ci"
          POSTGRES_HOST: "localhost"
          ENVIRONMENT: ci
          LDAP_ENABLED: 'false'
      - name: pytest
        run: cd backend && pip install pytest pytest-asyncio httpx python-docx openpyxl aiosqlite && python -m pytest tests/ -q --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ENVIRONMENT: test
          LDAP_ENABLED: 'false'
  cd:
    name: CD - Deploy a QAS
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH (extraer + rebuild + restart)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QAS_HOST }}
          username: ${{ secrets.QAS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/sgd
            cp -a .env.qas /tmp/env_bak 2>/dev/null; cp -a deploy/nginx/ssl /tmp/ssl_bak 2>/dev/null
            find . -mindepth 1 -not -path './backups' -not -path './backups/*' -delete 2>/dev/null
            git init && git remote add origin https://github.com/YawarChavezG/Docu.git
            git fetch origin ${{ github.ref_name }} --depth 1
            git checkout FETCH_HEAD
            cp -a /tmp/env_bak .env.qas 2>/dev/null; mkdir -p deploy/nginx/ssl && cp -a /tmp/ssl_bak/. deploy/nginx/ssl/ 2>/dev/null
            chmod +x scripts/*.sh 2>/dev/null
            if [ -f deploy/nginx/conf.d/sgd-qas.conf.bk ]; then mv deploy/nginx/conf.d/sgd-qas.conf.bk deploy/nginx/conf.d/sgd-qas.conf; fi
            docker compose -f deploy/docker-compose.qas.yml --env-file .env.qas build --pull backend celery-worker celery-beat frontend 2>&1 | tail -3
            docker compose -f deploy/docker-compose.qas.yml --env-file .env.qas up -d && sleep 15 && docker restart sgd-qas-nginx
      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QAS_HOST }}
          username: ${{ secrets.QAS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 30); do S=$(curl -kfsS -o /dev/null -w "%{http_code}" https://localhost/api/v1/health 2>/dev/null); [ "$S" = "200" ] && echo "OK ($((i*2))s)" && exit 0; sleep 2; done; exit 1
      - name: Seeds + Validacion
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QAS_HOST }}
          username: ${{ secrets.QAS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/sgd; bash scripts/start-stack-qas.sh 2>&1 | tail -3; bash scripts/validate-qas.sh 2>&1 | grep -E "PASS:|FAIL:|WARN:"
