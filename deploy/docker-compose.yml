# ════════════════════════════════════════════════════════════════
# COFAR SGD — Docker Compose para DESARROLLO (Windows + Linux)
# Levanta: nginx, frontend (Vite HMR), backend (FastAPI), 
#          postgres, redis, mailhog (stub SMTP)
# ════════════════════════════════════════════════════════════════

name: sgd-des

services:

  # ────────────────────────────────────────────────────────────
  # PostgreSQL 16 (con pgvector para IA - fase futura)
  # ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sgd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
      PGTZ: ${TZ}
    ports:
      - "${HOST_PORT_POSTGRES}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-net

  # ────────────────────────────────────────────────────────────
  # Redis 7 (broker de Celery + cache de sesiones)
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sgd-redis
    restart: unless-stopped
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass \"$$REDIS_PASSWORD\"
        else
          redis-server
        fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${HOST_PORT_REDIS}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-net

  # ────────────────────────────────────────────────────────────
  # MailHog (stub SMTP para dev — captura emails en UI web)
  # UI: http://localhost:8025
  # ────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sgd-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      TZ: ${TZ}
    networks:
      - sgd-net

  # ────────────────────────────────────────────────────────────
  # Backend FastAPI
  # Configuración de red: bridge (default).
  # Si .wslconfig tiene networkingMode=mirrored, este contenedor
  # ve la VPN del host Windows y puede llegar a rodc.cofar.com.bo.
  # ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-backend
    restart: unless-stopped
    # DNS custom: los DCs de COFAR primero (para resolver nombres
    # internos de la red corporativa), Google DNS como fallback.
    # El contenedor en modo 'mirrored' ve la VPN del host, pero
    # sin DNS explicito las queries usan el DNS del daemon de
    # Docker (a veces 8.8.8.8 o el del router) y fallan al
    # resolver dc3-cofar.com o cualquier nombre de COFAR.
    dns:
      - 172.16.10.50   # DC COFAR #1 (DNS primario de la VPN)
      - 172.16.10.51   # DC COFAR #2 (DNS secundario)
      - 8.8.8.8        # Google DNS (fallback para internet)
    dns_search:
      - cofar.com
      - .
    command: >
      sh -c "
        echo 'Esperando a PostgreSQL...' &&
        until nc -z postgres 5432; do sleep 1; done &&
        echo 'PostgreSQL listo. Aplicando migraciones (si las hay)...' &&
        alembic upgrade head 2>&1 || echo 'Sin migraciones aún (esperado en R1)' &&
        echo 'Iniciando uvicorn...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    environment:
      # ── App ──
      PROJECT_NAME: ${PROJECT_NAME:-cofar-sgd}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      TZ: ${TZ:-America/La_Paz}
      DEBUG: ${BACKEND_DEBUG:-true}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      # ── DB / Redis ──
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      # ── JWT ──
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # ── CORS ──
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      # ── LDAP ──
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_SERVER: ${LDAP_SERVER:-172.16.10.17}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_USE_SSL: ${LDAP_USE_SSL:-false}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_USER: ${LDAP_BIND_USER:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USER_SEARCH_FILTER: ${LDAP_USER_SEARCH_FILTER:-}
      LDAP_USER_SEARCH_BASE: ${LDAP_USER_SEARCH_BASE:-}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-cofar.com}
      LDAP_EXCLUDED_CNS: ${LDAP_EXCLUDED_CNS:-}
      LDAP_EXCLUDED_SAMACCOUNTNAMES: ${LDAP_EXCLUDED_SAMACCOUNTNAMES:-}
      # ── Graph ──
      GRAPH_ENABLED: ${GRAPH_ENABLED:-false}
      MS_TENANT_ID: ${MS_TENANT_ID:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      GRAPH_SCOPES: ${GRAPH_SCOPES:-}
      # ── SMTP ──
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@cofar.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SGD COFAR}
      # ── Rate limits ──
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-10}
      RATE_LIMIT_DOWNLOAD: ${RATE_LIMIT_DOWNLOAD:-30}
    ports:
      - "${HOST_PORT_BACKEND}:8000"
    volumes:
      - ../backend:/app
      - backend_storage:/app/storage
    # En DES: el contenedor ve la VPN del host (mirrored mode).
    # En QAS/PRD: el contenedor está en la red de COFAR directamente.
    # En ambos casos LDAP funciona. Sin extra_hosts porque el DNS
    # de arriba resuelve los nombres de COFAR.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sgd-net

  # ────────────────────────────────────────────────────────────
  # Celery Worker (tareas async: emails, IA, reportes)
  # ────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      TZ: ${TZ}
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgd-net
    # Healthcheck especifico para celery (el del Dockerfile apunta a :8000
    # que no existe en el worker). Sesion 25: ping al worker para confirmar
    # que esta respondiendo a mensajes del broker.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=5 || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # Celery Beat (cron jobs: SLA, vencimientos, sync AD)
  # ────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-celery-beat
    restart: unless-stopped
    # -s fuerza el schedule file a /app/storage (escribible por sgduser).
    # Sin esto celery-beat intenta escribir en CWD (/app) que es propiedad de root
    # porque la imagen base hace COPY . /app antes de USER sgduser.
    command: celery -A app.workers.celery_app beat --loglevel=info -s /app/storage/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TZ: ${TZ}
    volumes:
      - ../backend:/app
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgd-net
    # Healthcheck especifico para celery-beat (no responde a inspect,
    # asi que verificamos que el proceso este vivo). Sesion 25: usar
    # /proc/1/cmdline + xargs -0 porque Alpine no tiene pgrep/ps.
    healthcheck:
      test: ["CMD-SHELL", "xargs -0 echo < /proc/1/cmdline | grep -q 'celery_app beat' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # Frontend (Vite dev server con HMR)
  # ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: sgd-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT_FRONTEND}:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:${HOST_PORT_BACKEND}/api/v1
      VITE_ENV: ${ENVIRONMENT}
      TZ: ${TZ}
    networks:
      - sgd-net

  # ────────────────────────────────────────────────────────────
  # Nginx (reverse proxy + entrypoint)
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sgd-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT_NGINX}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Sesion 13: SSL volume para que sgd-qas.conf (en conf.d/ por bug
      # preexistente) pueda cargar sus certs dummy en DES.
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      TZ: ${TZ}
    depends_on:
      - backend
      - frontend
    networks:
      - sgd-net

# ─── Volúmenes persistentes ───
volumes:
  postgres_data:
    name: sgd-des_postgres_data
  redis_data:
    name: sgd-des_redis_data
  backend_storage:
    name: sgd-des_backend_storage
  frontend_node_modules:
    name: sgd-des_frontend_node_modules

# ─── Red interna ───
networks:
  sgd-net:
    name: sgd-des_net
    driver: bridge
