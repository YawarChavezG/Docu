# ════════════════════════════════════════════════════════════════
# COFAR SGD — Docker Compose para QAS (sgdqas.cofar.com.bo)
# Server: SRVQAS-SIGDOC (Debian 12, 2 vCPU, 16GB RAM)
# BD fresh + seeds + 4 stubs DES (sin import de matriz abril)
# HTTPS con cert autofirmado
#
# Levantar: scripts/start-stack-qas.sh
# Ver: docs/PR/DEPLOY-QAS.md
# ════════════════════════════════════════════════════════════════

name: sgd-qas

services:

  postgres:
    image: postgres:16-alpine
    container_name: sgd-qas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
      PGTZ: ${TZ}
    volumes:
      - sgd-qas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-qas-net

  redis:
    image: redis:7-alpine
    container_name: sgd-qas-redis
    restart: unless-stopped
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass \"$$REDIS_PASSWORD\"
        else
          redis-server
        fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ}
    volumes:
      - sgd-qas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-qas-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sgd-qas-mailhog
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    networks:
      - sgd-qas-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-qas-backend
    restart: unless-stopped
    dns:
      - 172.16.10.50
      - 172.16.10.51
      - 8.8.8.8
    dns_search:
      - cofar.com
      - .
    command: bash scripts/entrypoint.sh
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      TZ: ${TZ}
      DEBUG: ${BACKEND_DEBUG}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LDAP_ENABLED: ${LDAP_ENABLED}
      LDAP_SERVER: ${LDAP_SERVER}
      LDAP_PORT: ${LDAP_PORT}
      LDAP_USE_SSL: ${LDAP_USE_SSL}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_BIND_USER: ${LDAP_BIND_USER}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_USER_SEARCH_FILTER: ${LDAP_USER_SEARCH_FILTER}
      LDAP_USER_SEARCH_BASE: ${LDAP_USER_SEARCH_BASE}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_EXCLUDED_CNS: ${LDAP_EXCLUDED_CNS}
      LDAP_EXCLUDED_SAMACCOUNTNAMES: ${LDAP_EXCLUDED_SAMACCOUNTNAMES}
      GRAPH_ENABLED: ${GRAPH_ENABLED}
      MS_TENANT_ID: ${MS_TENANT_ID}
      MS_CLIENT_ID: ${MS_CLIENT_ID}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      GRAPH_SCOPES: ${GRAPH_SCOPES}
      SMTP_ENABLED: ${SMTP_ENABLED}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN}
      RATE_LIMIT_DOWNLOAD: ${RATE_LIMIT_DOWNLOAD}
    volumes:
      - ../backend:/app
      - sgd-qas_backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sgd-qas-net

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-qas-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      TZ: ${TZ}
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sgd-qas-net

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-qas-celery-beat
    restart: unless-stopped
    # -s fuerza el schedule file a /app/storage (escribible por sgduser).
    # El volume `sgd-qas_backend_storage` es compartido con backend.
    # Ver docker-compose.yml para el detalle de la decision (ADR-024).
    command: celery -A app.workers.celery_app beat --loglevel=info -s /app/storage/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TZ: ${TZ}
    volumes:
      - ../backend:/app
      - sgd-qas_backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "xargs -0 echo < /proc/1/cmdline | grep -q 'celery_app beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sgd-qas-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: sgd-qas-frontend
    restart: unless-stopped
    volumes:
      - ../frontend:/app
      - sgd-qas_frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: /api/v1
      VITE_ENV: ${ENVIRONMENT}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sgd-qas-net

  nginx:
    image: nginx:1.27-alpine
    container_name: sgd-qas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      TZ: ${TZ}
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'nginx: master' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sgd-qas-net

volumes:
  sgd-qas_postgres_data:
  sgd-qas_redis_data:
  sgd-qas_backend_storage:
  sgd-qas_frontend_node_modules:

networks:
  sgd-qas-net:
    driver: bridge
