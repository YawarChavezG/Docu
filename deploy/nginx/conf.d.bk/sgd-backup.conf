# ════════════════════════════════════════════════════════════════
# COFAR SGD — Server block del STACK BACKUP
# Misma logica que sgd.conf (original), escucha en :80 dentro del
# contenedor (mapeado a 8081 en el host via docker-compose).
# Sirve: frontend estatico (SPA) + proxy /api/* al backend
#
# Este archivo esta en deploy/nginx/conf.d.bk/ (no en conf.d/)
# para que el nginx del stack ORIGINAL no lo cargue.
# Ver docker-compose.backup.yml.
# ════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # ─── Headers de seguridad ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Frontend (SPA) ───
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API backend ───
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ─── Auth endpoints (rate limit mas estricto) ───
    location ~ ^/api/v1/auth/(login|refresh) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health check (sin rate limit) ───
    location /health {
        proxy_pass http://backend:8000/api/v1/health;
        access_log off;
    }

    # ─── MailHog UI (solo dev) ───
    location /mailhog/ {
        proxy_pass http://mailhog:8025/;
    }
}
