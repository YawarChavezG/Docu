# ════════════════════════════════════════════════════════════════
# COFAR SGD — Server block QAS (HTTPS + HTTP redirect)
# Escucha 80 (redirect a 443) y 443 (HTTPS con cert autofirmado)
# Sirve: frontend estatico (SPA) + proxy /api/* al backend
# ════════════════════════════════════════════════════════════════

# ─── HTTP (puerto 80) - redirect permanente a HTTPS ───
server {
    listen 80;
    server_name sgdqas.cofar.com.bo _;

    # Health check sin redirect (para monitoring)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Todo lo demas -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (puerto 443) - aplicacion real ───
server {
    listen 443 ssl http2;
    server_name sgdqas.cofar.com.bo;

    ssl_certificate     /etc/nginx/ssl/sgdqas.crt;
    ssl_certificate_key /etc/nginx/ssl/sgdqas.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Headers de seguridad ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Frontend (SPA) ───
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API backend ───
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ─── Health check (sin TLS overhead) ───
    location /health {
        proxy_pass http://backend:8000/api/v1/health;
        access_log off;
    }
}
