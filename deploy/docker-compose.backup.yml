# ════════════════════════════════════════════════════════════════
# COFAR SGD — Docker Compose para STACK BACKUP (paralelo)
# Levanta un entorno AISLADO del stack original en otros puertos.
# Mismo codigo, BD diferente (sgd_backup), sin colisionar.
#
# Levanta con: scripts\start-stack-backup.bat
# Ver docs/PR/BACKUP-PARALELO.md
# ════════════════════════════════════════════════════════════════

name: sgd-des-bk

services:

  # ────────────────────────────────────────────────────────────
  # PostgreSQL 16 (con pgvector para IA - fase futura)
  # BD: sgd_backup (distinta del original `sgd`)
  # ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sgd-bk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
      PGTZ: ${TZ}
    ports:
      - "${HOST_PORT_POSTGRES}:5432"
    volumes:
      - postgres_data_bk:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-bk-net

  # ────────────────────────────────────────────────────────────
  # Redis 7 (broker de Celery + cache de sesiones)
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sgd-bk-redis
    restart: unless-stopped
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass \"$$REDIS_PASSWORD\"
        else
          redis-server
        fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${HOST_PORT_REDIS}:6379"
    volumes:
      - redis_data_bk:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgd-bk-net

  # ────────────────────────────────────────────────────────────
  # MailHog (stub SMTP para dev — captura emails en UI web)
  # Web UI: http://localhost:8026  (SMTP: 1026)
  # ────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sgd-bk-mailhog
    restart: unless-stopped
    ports:
      - "1026:1025"  # SMTP
      - "8026:8025"  # Web UI
    networks:
      - sgd-bk-net

  # ────────────────────────────────────────────────────────────
  # Backend FastAPI
  # ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-bk-backend
    restart: unless-stopped
    dns:
      - 172.16.10.50
      - 172.16.10.51
      - 8.8.8.8
    dns_search:
      - cofar.com
      - .
    command: >
      sh -c "
        echo 'Esperando a PostgreSQL...' &&
        until nc -z postgres 5432; do sleep 1; done &&
        echo 'PostgreSQL listo. Aplicando migraciones (si las hay)...' &&
        alembic upgrade head 2>&1 || echo 'Sin migraciones nuevas (BD ya tiene 10)' &&
        echo 'Iniciando uvicorn...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      TZ: ${TZ}
      DEBUG: ${BACKEND_DEBUG}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LDAP_ENABLED: ${LDAP_ENABLED}
      LDAP_SERVER: ${LDAP_SERVER}
      LDAP_PORT: ${LDAP_PORT}
      LDAP_USE_SSL: ${LDAP_USE_SSL}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_BIND_USER: ${LDAP_BIND_USER}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_USER_SEARCH_FILTER: ${LDAP_USER_SEARCH_FILTER}
      LDAP_USER_SEARCH_BASE: ${LDAP_USER_SEARCH_BASE}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_EXCLUDED_CNS: ${LDAP_EXCLUDED_CNS}
      LDAP_EXCLUDED_SAMACCOUNTNAMES: ${LDAP_EXCLUDED_SAMACCOUNTNAMES}
      GRAPH_ENABLED: ${GRAPH_ENABLED}
      MS_TENANT_ID: ${MS_TENANT_ID}
      MS_CLIENT_ID: ${MS_CLIENT_ID}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      GRAPH_SCOPES: ${GRAPH_SCOPES}
      SMTP_ENABLED: ${SMTP_ENABLED}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN}
      RATE_LIMIT_DOWNLOAD: ${RATE_LIMIT_DOWNLOAD}
    ports:
      - "${HOST_PORT_BACKEND}:8000"
    volumes:
      - ../backend:/app
      - backend_storage_bk:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sgd-bk-net

  # ────────────────────────────────────────────────────────────
  # Celery Worker (tareas async: emails, IA, reportes)
  # ────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-bk-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgd-bk-net

  # ────────────────────────────────────────────────────────────
  # Celery Beat (cron jobs: SLA, vencimientos, sync AD)
  # ────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sgd-bk-celery-beat
    restart: unless-stopped
    # -s fuerza el schedule file a /app/storage (escribible por sgduser).
    # Ver docker-compose.yml para el detalle de la decision (ADR-024).
    command: celery -A app.workers.celery_app beat --loglevel=info -s /app/storage/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ../backend:/app
      - backend_storage_bk:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgd-bk-net

  # ────────────────────────────────────────────────────────────
  # Frontend (Vite dev server con HMR)
  # ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: sgd-bk-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT_FRONTEND}:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules_bk:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:${HOST_PORT_BACKEND}/api/v1
      VITE_ENV: ${ENVIRONMENT}
    networks:
      - sgd-bk-net

  # ────────────────────────────────────────────────────────────
  # Nginx (reverse proxy + entrypoint)
  # Sirve config custom sgd-backup.conf en lugar de sgd.conf
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sgd-bk-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT_NGINX}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d.bk:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sgd-bk-net

# ─── Volúmenes persistentes (aislados del stack original) ───
volumes:
  postgres_data_bk:
    name: sgd-des-bk_postgres_data
  redis_data_bk:
    name: sgd-des-bk_redis_data
  backend_storage_bk:
    name: sgd-des-bk_backend_storage
  frontend_node_modules_bk:
    name: sgd-des-bk_frontend_node_modules

# ─── Red interna (aislada del stack original) ───
networks:
  sgd-bk-net:
    name: sgd-des-bk_net
    driver: bridge
